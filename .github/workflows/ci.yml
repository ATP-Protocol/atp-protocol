name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sdk-ts:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        working-directory: sdk/ts
        run: npm install
      - name: Typecheck
        working-directory: sdk/ts
        run: npx tsc --noEmit
      - name: Build (CJS + ESM)
        working-directory: sdk/ts
        run: npm run build
      - name: Run tests
        working-directory: sdk/ts
        run: npx vitest run

  sdk-python:
    name: Python SDK
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        working-directory: sdk/python
        run: pip install -e ".[dev]"
      - name: Run tests
        working-directory: sdk/python
        run: pytest tests/ -v

  gateway:
    name: Gateway Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        working-directory: gateway
        run: npm install
      - name: Typecheck
        working-directory: gateway
        run: npx tsc --noEmit
      - name: Build (CJS + ESM)
        working-directory: gateway
        run: npm run build
      - name: Run tests
        working-directory: gateway
        run: npx vitest run

  conformance:
    name: Conformance Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        working-directory: conformance
        run: npm install
      - name: Build
        working-directory: conformance
        run: npm run build
      - name: Run tests
        working-directory: conformance
        run: npx jest
      - name: Generate reference conformance report
        if: matrix.node-version == 20
        working-directory: conformance
        run: npm run report:reference > reference-conformance-report.json
      - name: Upload reference conformance report
        if: matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: reference-conformance-report
          path: conformance/reference-conformance-report.json

  proof-demo:
    name: MCP Proof Demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install gateway dependencies
        working-directory: gateway
        run: npm install
      - name: Install demo dependencies
        working-directory: examples/mcp-demo
        run: npm install
      - name: Run strict proof demo
        working-directory: examples/mcp-demo
        run: npm run proof
      - name: Validate proof report
        working-directory: examples/mcp-demo
        run: |
          node -e "
            const report = require('./proof/latest-demo-report.json');
            if (report.summary.total !== 6) throw new Error('Expected 6 scenarios');
            if (report.summary.expected_mismatches !== 0) throw new Error('Proof mismatches found');
            if (report.summary.success < 3) throw new Error('Expected at least 3 success scenarios');
            if (report.summary.denied < 2) throw new Error('Expected at least 2 denial scenarios');
            if (report.summary.pending < 1) throw new Error('Expected at least 1 pending scenario');
            console.log('Proof report valid');
          "
      - name: Upload proof report
        uses: actions/upload-artifact@v4
        with:
          name: mcp-demo-proof-report
          path: examples/mcp-demo/proof/latest-demo-report.json

  mcp-server:
    name: MCP Server Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build SDK dependency
        working-directory: sdk/ts
        run: npm install && npm run build
      - name: Build gateway dependency
        working-directory: gateway
        run: npm install && npm run build
      - name: Install MCP server dependencies
        working-directory: mcp-server
        run: npm install --legacy-peer-deps
      - name: Typecheck MCP server
        working-directory: mcp-server
        run: npm run typecheck
      - name: Build MCP server
        working-directory: mcp-server
        run: npm run build
      - name: Dry-run MCP package
        working-directory: mcp-server
        run: npm pack --dry-run

  schema:
    name: Schema Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate contract schema
        run: |
          node -e "
            const schema = require('./spec/schemas/atp-contract.schema.json');
            console.log('Schema loaded:', schema.title);
            console.log('Required fields:', schema.required);
            console.log('Properties:', Object.keys(schema.properties).length);
            console.log('Schema valid: true');
          "
      - name: Validate example contracts
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const dir = './examples/contracts';
            const files = fs.readdirSync(dir).filter(f => f.endsWith('.json'));
            for (const file of files) {
              const contract = JSON.parse(fs.readFileSync(path.join(dir, file)));
              const required = ['version', 'authority', 'actions', 'attestation'];
              const missing = required.filter(f => !contract[f]);
              if (missing.length > 0) {
                throw new Error(file + ' missing: ' + missing.join(', '));
              }
              console.log('✓', file);
            }
            console.log('All example contracts valid');
          "
